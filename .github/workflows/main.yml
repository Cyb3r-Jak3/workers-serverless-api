name: Deploy

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/**'
      - '.github/workflows/main.yml'
      - 'package.json'
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths: ['package.json', '**/pnpm-lock.yaml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        if: ${{github.ref_type == 'branch'}}
        run: pnpm run test:lint

      # - name: Test
      #   if: ${{github.ref_type == 'branch'}}
      #   run: pnpm run test:unit

      - name: Report Variables
        run: |
          echo "GitHash=${{ github.sha }}" >> $GITHUB_ENV
          echo "BuiltTime=$(git show -s --format=%ci ${GITHUB_SHA::8})" >> $GITHUB_ENV

      - name: Deploy to Cloudflare with Wrangler
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        with:
          command: deploy --env production
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: 4.71.0
          environment: production
          secrets: |
            GitHash
            BuiltTime
        env:
          GitHash: ${{ env.GitHash }}
          BuiltTime: ${{ env.BuiltTime }}
